name: fixa
description: "FIXA — mechanic-on-demand mobile app for Luchi Motors (Zambia)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.2
  go_router: ^13.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  lottie: ^3.1.0
  flutter_svg: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fixa.png
    - assets/gear.png
    - assets/tire.png
    - assets/service.png
    - assets/svgs/google.svg
